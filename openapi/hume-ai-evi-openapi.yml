          description: >-
            How long the user must be silent before EVI considers their turn complete and begins generating a response.
            Lower values make conversations feel snappier but increase the chance of the agent responding during a
            mid-thought pause. Higher values give users more room to pause and collect their thoughts before the agent
            responds. Accepts values between 500 and 3000 milliseconds.
        prefix_padding_ms:
          type:
            - integer
            - 'null'
          description: >-
            The duration of audio captured before the detected start of speech. This ensures the beginning of an
            utterance is not clipped. Accepts values between 0 and 1000 milliseconds.
        speech_detection_threshold:
          type:
            - number
            - 'null'
          format: double
          description: >-
            How confident the system must be that audio contains speech before it begins processing. Lower values
            increase sensitivity, capturing softer speech at the cost of more noise-triggered processing. Higher values
            require clearer, louder audio to register as speech. Accepts values between 0.0 and 1.0.
      description: A turn detection specification posted to the server
      title: posted_turn_detection_spec
    VoiceProvider:
      type: string
      enum:
        - HUME_AI
        - CUSTOM_VOICE
      title: VoiceProvider
    VoiceId:
      type: object
      properties:
        id:
          type: string
          description: The unique ID associated with the **Voice**.
        provider:
          $ref: '#/components/schemas/VoiceProvider'
          description: >-
            Specifies the source provider associated with the chosen voice.


            - **`HUME_AI`**: Select voices from Hume's [Voice Library](https://app.hume.ai/tts/voice-library),
            containing a variety of preset, shared voices.

            - **`CUSTOM_VOICE`**: Select from voices you've personally generated and saved in your account. 


            If no provider is explicitly set, the default provider is `CUSTOM_VOICE`. When using voices from Hume's
            **Voice Library**, you must explicitly set the provider to `HUME_AI`.


            Preset voices from Hume's **Voice Library** are accessible by all users. In contrast, your custom voices are
            private and accessible only via requests authenticated with your API key.
      required:
        - id
      title: VoiceId
    VoiceName:
      type: object
      properties:
        name:
          type: string
          description: The name of a **Voice**.
        provider:
          $ref: '#/components/schemas/VoiceProvider'
          description: >-
            Specifies the source provider associated with the chosen voice.


            - **`HUME_AI`**: Select voices from Hume's [Voice Library](https://app.hume.ai/tts/voice-library),
            containing a variety of preset, shared voices.

            - **`CUSTOM_VOICE`**: Select from voices you've personally generated and saved in your account. 


            If no provider is explicitly set, the default provider is `CUSTOM_VOICE`. When using voices from Hume's
            **Voice Library**, you must explicitly set the provider to `HUME_AI`.


            Preset voices from Hume's **Voice Library** are accessible by all users. In contrast, your custom voices are
            private and accessible only via requests authenticated with your API key.
      required:
        - name
      title: VoiceName
    VoiceRef:
      oneOf:
        - $ref: '#/components/schemas/VoiceId'
        - $ref: '#/components/schemas/VoiceName'
      title: VoiceRef
    PostedWebhookSpecEventsItems:
      type: string
