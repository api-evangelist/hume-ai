    PostedConfigEventMessages:
      type: object
      properties:
        on_inactivity_timeout:
          $ref: '#/components/schemas/PostedEventMessageSpecsOnInactivityTimeout'
        on_max_duration_timeout:
          $ref: '#/components/schemas/PostedEventMessageSpecsOnMaxDurationTimeout'
        on_new_chat:
          $ref: '#/components/schemas/PostedEventMessageSpecsOnNewChat'
      title: PostedConfigEventMessages
    posted_interruption_spec:
      type: object
      properties:
        min_interruption_ms:
          type:
            - integer
            - 'null'
          description: >-
            How long the user must speak while the agent is outputting audio before the agent stops and yields the
            floor. Lower values make the agent more responsive to the user speaking up, but increase the chance of noise
            or backchannels stopping the agent unnecessarily. Higher values make the agent harder to interrupt, allowing
            it to finish more of its response before yielding. Accepts values between 50 and 2000 milliseconds.
      description: An interruption specification posted to the server
      title: posted_interruption_spec
