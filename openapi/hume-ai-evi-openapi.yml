        version_description:
          type:
            - string
            - 'null'
          description: An optional description of the Config version.
        voice:
          $ref: '#/components/schemas/VoiceRef'
          description: A voice specification associated with this Config.
        webhooks:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/posted_webhook_spec'
          description: Webhook config specifications for each subscriber.
      required:
        - evi_version
        - name
      description: A configuration to be posted to the server
      title: posted_config
    ReturnBuiltinToolToolType:
      type: string
      enum:
        - BUILTIN
        - FUNCTION
      title: ReturnBuiltinToolToolType
    return_builtin_tool:
      type: object
      properties:
        fallback_content:
          type:
            - string
            - 'null'
          description: >-
            Optional text passed to the supplemental LLM in place of the tool call result. The LLM then uses this text
            to generate a response back to the user, ensuring continuity in the conversation if the Tool errors.
        name:
          type: string
          description: >-
            Name of the built-in tool to use. Hume supports the following built-in tools:


            - **web_search:** enables EVI to search the web for up-to-date information when applicable.

            - **hang_up:** closes the WebSocket connection when appropriate (e.g., after detecting a farewell in the
            conversation).


            For more information, see our guide on [using built-in
            tools](/docs/speech-to-speech-evi/features/tool-use#using-built-in-tools).
        tool_type:
          $ref: '#/components/schemas/ReturnBuiltinToolToolType'
      required:
        - name
        - tool_type
      description: A specific builtin tool version returned from the server
      title: return_builtin_tool
    return_ellm_model:
      type: object
      properties:
        allow_short_responses:
          type: boolean
          description: >-
            Boolean indicating if the eLLM is allowed to generate short responses (new EVI 3 configs default to
            disabled; new versions inherit prior value when omitted).
      required:
        - allow_short_responses
      description: A specific eLLM Model configuration
      title: return_ellm_model
    return_event_message_spec:
      type: object
      properties:
        enabled:
          type: boolean
          description: |-
            Boolean indicating if this event message is enabled.

            If set to `true`, a message will be sent when the circumstances for the specific event are met.
        text:
          type:
            - string
            - 'null'
          description: >-
            Text to use as the event message when the corresponding event occurs. If no text is specified, EVI will
            generate an appropriate message based on its current context and the system prompt.
      required:
        - enabled
      description: A specific event message configuration to be returned from the server
      title: return_event_message_spec
    return_event_message_specs:
      type: object
      properties:
        on_inactivity_timeout:
          $ref: '#/components/schemas/return_event_message_spec'
        on_max_duration_timeout:
          $ref: '#/components/schemas/return_event_message_spec'
        on_new_chat:
          $ref: '#/components/schemas/return_event_message_spec'
      description: >-
        Collection of event messages returned by the server.


        Event messages are sent by the server when specific events occur during a chat session. These messages are used
        to configure behaviors for EVI, such as controlling how EVI starts a new conversation.
      title: return_event_message_specs
    return_interruption_spec:
      type: object
      properties:
        min_interruption_ms:
          type:
            - integer
            - 'null'
          description: >-
            How long the user must speak while the agent is outputting audio before the agent stops and yields the
            floor. Lower values make the agent more responsive to the user speaking up, but increase the chance of noise
            or backchannels stopping the agent unnecessarily. Higher values make the agent harder to interrupt, allowing
            it to finish more of its response before yielding. Accepts values between 50 and 2000 milliseconds.
      description: An interruption configuration returned from the server
      title: return_interruption_spec
    return_language_model:
      type: object
      properties:
        model_provider:
          $ref: '#/components/schemas/ModelProviderEnum'
        model_resource:
          $ref: '#/components/schemas/LanguageModelType'
        temperature:
          type:
            - number
            - 'null'
          format: double
          description: >-
            The model temperature, with values between 0 to 1 (inclusive).


            Controls the randomness of the LLM's output, with values closer to 0 yielding focused, deterministic
            responses and values closer to 1 producing more creative, diverse responses.
      description: A specific LanguageModel
      title: return_language_model
    return_nudge_spec:
      type: object
      properties:
        enabled:
          type: boolean
          description: If true, EVI will 'nudge' the user to speak after a determined interval of silence.
        interval_secs:
          type:
            - integer
            - 'null'
          description: The interval of inactivity (in seconds) before a nudge is triggered.
      required:
        - enabled
      description: A specific nudge configuration returned from the server
      title: return_nudge_spec
    return_prompt_public:
      type: object
      properties:
        created_on:
          type: integer
          format: int64
          description: Time at which the Prompt was created. Measured in seconds since the Unix epoch.
        id:
          type: string
          description: Identifier for a Prompt. Formatted as a UUID.
        modified_on:
          type: integer
          format: int64
          description: Time at which the Prompt was last modified. Measured in seconds since the Unix epoch.
        name:
          type: string
          description: Name applied to all versions of a particular Prompt.
        prompt_expansion:
          $ref: '#/components/schemas/prompt_expansion_spec'
        text:
          type: string
          description: >-
            Instructions used to shape EVI's behavior, responses, and style.


            You can use the Prompt to define a specific goal or role for EVI, specifying how it should act or what it
            should focus on during the conversation. For example, EVI can be instructed to act as a customer support
            representative, a fitness coach, or a travel advisor, each with its own set of behaviors and response
            styles. For help writing a system prompt, see our [Prompting
            Guide](/docs/speech-to-speech-evi/guides/prompting).
        version:
          type: integer
          description: >-
            Version number for a Prompt. Version numbers should be integers. The combination of configId and version
            number is unique.
        version_description:
          type:
            - string
            - 'null'
          description: An optional description of the Prompt version.
        version_type:
          type: string
          description: >-
            Indicates whether this prompt is using a fixed version number or auto-updating to the latest version. Values
            from the VersionType enum.
      required:
        - created_on
        - id
        - modified_on
        - name
        - text
        - version
        - version_type
      description: A specific prompt version returned from the server
      title: return_prompt_public
    return_timeout_spec:
      type: object
      properties:
        duration_secs:
          type:
            - integer
            - 'null'
          description: Duration in seconds for the timeout (e.g. 600 seconds represents 10 minutes).
        enabled:
          type: boolean
          description: >-
            Boolean indicating if this timeout is enabled.


            If set to false, EVI will not timeout due to a specified duration being reached. However, the conversation
            will eventually disconnect after 1,800 seconds (30 minutes), which is the maximum WebSocket duration limit
            for EVI.
      required:
        - enabled
      description: A specific timeout configuration to be returned from the server
      title: return_timeout_spec
    return_timeout_specs:
      type: object
      properties:
        inactivity:
          $ref: '#/components/schemas/return_timeout_spec'
        max_duration:
          $ref: '#/components/schemas/return_timeout_spec'
      required:
        - inactivity
        - max_duration
      description: >-
        Collection of timeout specifications returned by the server.


        Timeouts are sent by the server when specific time-based events occur during a chat session. These
        specifications set the inactivity timeout and the maximum duration an EVI WebSocket connection can stay open
        before it is automatically disconnected.
      title: return_timeout_specs
