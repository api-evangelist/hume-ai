    resources:
    - path: /v1/v0/evi/chats
      name: v0-evi-chats
      description: REST surface for v0-evi-chats.
      operations:
      - method: GET
        name: listchats
        description: List chats
        call: evi-subpackage-chats.listchats
        with:
