          ascending_order: rest.ascending_order
          X-Hume-Api-Key: rest.X-Hume-Api-Key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v0/evi/chats/{id}/audio
      name: v0-evi-chats-id-audio
      description: REST surface for v0-evi-chats-id-audio.
      operations:
      - method: GET
