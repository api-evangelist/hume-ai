specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Hume AI
providerId: hume-ai
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Voice
- Empathic
- Emotion
- Multimodal
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Hume AI. Hume bills via subscription plan tiers (with bundled
  TTS characters and EVI minutes) plus per-character TTS overage and per-minute EVI overage.
  Expression Measurement is fully pay-as-you-go priced per minute, image, or word.
notes: Plan-tier sizing is the dominant FinOps decision; right-size based on monthly TTS character + EVI minute projections.
sources:
- https://www.hume.ai/pricing
- https://dev.hume.ai/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Hume AI
serviceCategory: AI
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Hume AI Voice and Expression Measurement
  ServiceCategory: AI
  ProviderName: Hume AI
  PublisherName: Hume AI
  InvoiceIssuerName: Hume AI
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: tts_characters
  description: Monthly TTS character allowance with overage at $0.05-0.15 per 1,000.
  unit: character
  aggregation: sum
  dimensions:
  - account
  - voice
- name: evi_minutes
  description: EVI speech-to-speech monthly minute allowance with overage at $0.04-0.06/min.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - chat_group
- name: expression_video_minutes
  description: Video-with-audio expression measurement at $0.0828/min.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - job
- name: expression_audio_minutes
  description: Audio-only expression measurement at $0.0639/min.
  unit: minute
  aggregation: sum
  dimensions:
  - account
  - job
- name: expression_images
  description: Image expression measurement at $0.00204 each.
  unit: image
  aggregation: sum
  dimensions:
  - account
  - job
- name: expression_words
  description: Text expression measurement at $0.00024/word.
  unit: word
  aggregation: sum
  dimensions:
  - account
  - job
principles:
- name: Visibility
  description: Use Hume billing dashboard to track TTS characters, EVI minutes, and Expression Measurement usage by job.
- name: Allocation
  description: Tag voices, EVI configs, and Expression Measurement jobs to business units.
- name: Optimization
  description: Right-size plan tier; for Expression Measurement, batch larger jobs and prefer audio-only over video where possible.
- name: Accountability
  description: Assign owners for TTS, EVI, and Expression Measurement budget lines separately.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
